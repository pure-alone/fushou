<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>热烈庆贺 张高华 任福首</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
</head>
<body>
  <div class="site">
    <header class="header">
      <div class="logo">
        <div class="logo-box" aria-hidden="true"></div>
        <div class="brand">庆贺福首 · 张高华</div>
      </div>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="video.html">祝福视频</a>
        <a href="messages.html">留言</a>
      </nav>
    </header>

    <main class="hero">
      <div class="lantern left" aria-hidden="true"></div>
      <div class="lantern right" aria-hidden="true"></div>

      <section class="card index-card">
        <div class="main-content">
          <h1>热烈庆贺<br><span class="highlight" style="color: #ff3b3b;">张高华</span><br>荣任福首</h1>
          <div class="subtitle">商通四海 · 福聚亲朋</div>

          <div class="blessing">
            恭贺张高华先生荣任福首！祝您生意兴隆、财源广进、事业蒸蒸日上！<br>
            借此福瑞之喜，也衷心祝愿各位亲朋好友共享福运，阖家安康、万事顺遂！
          </div>

          <div class="action-group" style="margin-top: 24px;">
            <button class="btn play" id="play-btn">播放背景音乐 ▶</button>
            <button class="btn" id="pause-btn" style="display:none">暂停音乐 ■</button>
            <button class="btn" id="confetti-btn">撒彩带庆祝 ✨</button>
          </div>
        </div>

        <aside class="controls side-controls">
          <div class="control-title">活动控制</div>
          <div class="audio-actions">
            <a class="btn btn-sm" href="video.html">祝福视频</a>
            <a class="btn btn-sm" href="messages.html">留言板</a>
          </div>
        </aside>
      </section>

      <audio id="bg-audio" src="assets/audio/index_music.mp3" loop autoplay muted playsinline></audio>
      <audio id="confetti-audio" src="assets/audio/confetti_sound.mp3" preload="auto"></audio>
    </main>
  </div>

  <script src="js/main.js" defer></script>
</body>
</html>
